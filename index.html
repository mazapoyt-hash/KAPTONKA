<!doctype html>

  <body>

            <rect x="46" y="36" width="164" height="88" rx="18" fill="#ffbd16"/>
            <path d="M111 124h34l-17 18z" fill="#ffbd16"/>
            <rect x="121" y="128" width="14" height="72" rx="7" fill="#072b63"/>

        <button data-route="home" class="nav-item active">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m3 10.5 9-7 9 7V21h-6v-6H9v6H3Z"/></svg>
          <span>Головна</span>
        </button>
        <button data-route="needs" class="nav-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Zm2 5h10V6H7v2Zm0 5h10v-2H7v2Zm0 5h7v-2H7v2Z"/></svg>

          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21.35 10.55 20C5.4 15.36 2 12.28 2 8.5A5.5 5.5 0 0 1 7.5 3 6 6 0 0 1 12 5.09 6 6 0 0 1 16.5 3 5.5 5.5 0 0 1 22 8.5c0 3.78-3.4 6.86-8.55 11.51Z"/></svg>
