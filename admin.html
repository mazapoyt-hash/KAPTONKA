<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Редактор даних — КАРТОНКА</title>
  <link rel="icon" href="./assets/favicon.svg" />
  <link rel="stylesheet" href="./styles.css" />
  <style>
    body{padding:24px}.admin{width:min(900px,100%);margin:auto}.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.editor{min-height:420px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.45}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}.warning{padding:14px;border-radius:16px;background:var(--red-soft);color:var(--red);line-height:1.5}@media(max-width:720px){.admin-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="admin">
    <div class="page-heading"><p class="eyebrow">Локальний інструмент</p><h1>Редактор даних</h1><p>Відредагуй JSON, завантаж файл і заміни ним відповідний файл у папці <code>data</code> на GitHub.</p></div>
    <div class="warning"><strong>Це не захищена адмін-панель.</strong> Вона не змінює сайт автоматично та не повинна містити приватні дані.</div>
    <div class="toolbar">
      <button class="btn btn-blue" data-load="needs">Потреби</button>
      <button class="btn btn-soft" data-load="points">Точки</button>
      <button class="btn btn-soft" data-load="updates">Оновлення</button>
      <button class="btn btn-primary" id="download">Завантажити JSON</button>
      <button class="btn btn-soft" id="validate">Перевірити JSON</button>
    </div>
    <div class="form-card"><div class="field"><label id="filename">data/needs.json</label><textarea id="editor" class="editor" spellcheck="false"></textarea></div></div>
    <div id="result" class="info-box" style="margin-top:12px">Оберіть набір даних.</div>
  </main>
<script type="module" src="./admin.js"></script>
</body>
</html>
